<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Squircle backdrop -->
  <rect x="8" y="8" width="84" height="84" rx="24" fill="#090915" stroke="url(#grad)" stroke-width="1.5" stroke-opacity="0.25" />
  
  <!-- Outer glow ring -->
  <rect x="8" y="8" width="84" height="84" rx="24" stroke="#818cf8" stroke-width="1" stroke-opacity="0.05" />

  <!-- Stylized geometric 'p' letterform -->
  <path d="M38 28h18c7.732 0 14 6.268 14 14s-6.268 14-14 14H44v20c0 1.105-.895 2-2 2h-2c-1.105 0-2-.895-2-2V30c0-1.105.895-2 2-2zm6 20h12c4.418 0 8-3.582 8-8s-3.582-8-8-8H44v16z" fill="url(#grad)" />
  
  <!-- Glowing lightning bolt cut -->
  <path d="M49 38L37 54h13l-3 16 14-18H48l1-12z" fill="#38bdf8" filter="url(#glow)" opacity="0.9" />
</svg>